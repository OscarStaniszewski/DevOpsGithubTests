name: Run tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run tests
    
    steps:
      - uses: actions/checkout@v5
        name: Checkout repo
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        name: Install python
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        name: Install dependencies
      - run: pytest -q
        name: Run pytest